<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline — AdminI Mobile</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background-color: #f7f8fa;
      color: #1a1a2e;
      padding: 1rem;
    }
    .container {
      text-align: center;
      max-width: 400px;
    }
    h1 {
      font-size: 1.5rem;
      margin-bottom: 0.5rem;
    }
    p {
      font-size: 1rem;
      color: #555;
      margin-bottom: 1.5rem;
    }
    button {
      background-color: #1a1a2e;
      color: #fff;
      border: none;
      padding: 0.75rem 1.5rem;
      font-size: 1rem;
      border-radius: 4px;
      cursor: pointer;
    }
    button:hover {
      background-color: #2d2d4e;
    }
    button:focus {
      outline: 2px solid #1a1a2e;
      outline-offset: 2px;
    }
  </style>
</head>
<body>
  <main class="container">
    <h1>You're offline</h1>
    <p>AdminI Mobile is not available right now. Check your connection and try again.</p>
    <button onclick="window.location.reload()" aria-label="Retry loading the page">Retry</button>
  </main>
</body>
</html>
