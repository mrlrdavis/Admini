[build]
command = "npm run build:apps"
publish = "dist/netlify"

[build.environment]
NODE_VERSION = "20"

[[redirects]]
from = "/desktop"
to = "/desktop/"
status = 301

[[redirects]]
from = "/desktop/*"
to = "/desktop/index.html"
status = 200

[[redirects]]
from = "/mobile"
to = "/mobile/"
status = 301

[[redirects]]
from = "/mobile/*"
to = "/mobile/index.html"
status = 200

[[redirects]]
from = "/"
to = "/desktop/"
status = 302

[[headers]]
for = "/*"
[headers.values]
X-Content-Type-Options = "nosniff"
Referrer-Policy = "strict-origin-when-cross-origin"
Permissions-Policy = "camera=(), microphone=(self), geolocation=()"
